<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>صفحة التقارير</title>
    <style>
        :root {
            --primary-color: #005a8d;
            --secondary-color: #f4f7f6;
            --text-color: #333333;
            --border-color: #dddddd;
            --accent-color: #e8f4f8;
            --highlight-color: #ff914d;
        }
        body {
            font-family: "Cairo", sans-serif;
            background-color: #eaeff2;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .header {
            text-align: center;
            background: linear-gradient(90deg, var(--primary-color), #0077b6);
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin: 0;
            font-weight: 700;
        }
        .header p {
            margin-top: 10px;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .report-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }
        .report-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, var(--primary-color), #0077b6);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            transition: background 0.3s ease-in-out, transform 0.2s;
        }
        .report-btn:hover {
            background: var(--highlight-color);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>المديرية العامة للتخطيط والدراسات</h1>
            <p>دائرة التخطيط والإحصاء - صفحة التقارير</p>
        </div>

        <div class="report-buttons">
            <a class="report-btn" href="/reports/1/index.html">2025 ورشة إعداد الخطط التفصيلية</a>
            <a class="report-btn" href="/reports/7/index.html">2026 تعزيز التكامل المؤسسي</a>
        </div>
    </div>
</body>
</html>
